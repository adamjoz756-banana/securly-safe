<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: radial-gradient(ellipse at top, #1a1a2e 0%, #0d0d0d 70%);
      color: white;
      font-family: Arial, sans-serif;
      min-height: 100vh;
    }
    h1 {
      text-align: center;
      padding: 50px 20px 10px;
      font-size: 2.8rem;
      letter-spacing: 4px;
      background: linear-gradient(90deg, #fff 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p.sub {
      text-align: center;
      color: #555;
      margin-bottom: 50px;
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 24px;
      padding: 20px 40px 60px;
    }
    .card {
      background: linear-gradient(145deg, #1a1a1a, #111);
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      width: 200px;
      padding: 30px 20px;
      text-align: center;
      text-decoration: none;
      color: white;
      font-size: 1.1rem;
      font-weight: bold;
      transition: all 0.25s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }
    .card:hover {
      background: linear-gradient(145deg, #222, #1a1a1a);
      border-color: #444;
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.6);
    }
    .card .emoji {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <h1>GAME PORTAL</h1>
  <p class="sub">Select a game to play</p>
  <div class="grid">
    <a class="card" href="drivemad.html">
      <span class="emoji">🚗</span>
      Drive Mad
    </a>
    <a class="card" href="polytrack.html">
      <span class="emoji">🏎️</span>
      PolyTrack
    </a>
    <a class="card" href="slope.html">
      <span class="emoji">🟢</span>
      Slope
    </a>
    <a class="card" href="chromedino.html">
      <span class="emoji">🦕</span>
      Chrome Dino
    </a>
    <a class="card" href="cookieclicker.html">
      <span class="emoji">🍪</span>
      Cookie Clicker
    </a>
    <a class="card" href="flappybird.html">
      <span class="emoji">🐦</span>
      Flappy Bird
    </a>
  </div>
</body>
</html>
