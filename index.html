<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game Portal by banana</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: white;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-glow {
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(139,92,246,0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 60px 20px 10px;
      animation: fadeInDown 0.8s ease both;
    }

    header h1 {
      font-size: 2.8rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #a855f7 0%, #6366f1 50%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: #444;
      font-size: 0.8rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 10px;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, #a855f7, #3b82f6);
      margin: 20px auto 30px;
      border-radius: 2px;
      animation: fadeIn 1s ease both;
    }

    .search-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      margin-bottom: 40px;
      animation: fadeIn 1s ease both;
    }

    .search-wrap input {
      width: 320px;
      padding: 12px 20px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.3s ease, background 0.3s ease;
    }

    .search-wrap input::placeholder { color: #555; }

    .search-wrap input:focus {
      border-color: rgba(168,85,247,0.6);
      background: rgba(255,255,255,0.08);
    }

    .grid {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 24px;
      padding: 0 40px 100px;
    }

    .card {
      width: 210px;
      height: 175px;
      border-radius: 20px;
      text-decoration: none;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.07);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease, border-color 0.3s ease;
      animation: fadeInUp 0.6s ease both;
      cursor: pointer;
    }

    .card.hidden { display: none; }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 60%);
    }

    .card::after {
      content: '';
      position: absolute;
      bottom: -40px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 80px;
      background: radial-gradient(ellipse, rgba(255,255,255,0.08) 0%, transparent 70%);
      transition: opacity 0.3s ease;
      opacity: 0;
    }

    .card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      border-color: rgba(255,255,255,0.18);
    }

    .card:hover::after { opacity: 1; }

    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.15s; }
    .card:nth-child(3) { animation-delay: 0.2s; }
    .card:nth-child(4) { animation-delay: 0.25s; }
    .card:nth-child(5) { animation-delay: 0.3s; }
    .card:nth-child(6) { animation-delay: 0.35s; }
    .card:nth-child(7) { animation-delay: 0.4s; }
    .card:nth-child(8) { animation-delay: 0.45s; }

    .card .emoji {
      font-size: 2.8rem;
      line-height: 1;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }

    .card:hover .emoji {
      transform: scale(1.2) translateY(-2px);
    }

    .card .label {
      font-size: 0.9rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-weight: bold;
      opacity: 0.95;
    }

    .no-results {
      display: none;
      color: #444;
      font-size: 1rem;
      text-align: center;
      width: 100%;
      padding: 40px 0;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .card-drivemad  { background: linear-gradient(145deg, #5b21b6, #4338ca); }
    .card-polytrack { background: linear-gradient(145deg, #1d4ed8, #0369a1); }
    .card-slope     { background: linear-gradient(145deg, #6d28d9, #5b21b6); }
    .card-flappy    { background: linear-gradient(145deg, #3730a3, #4f46e5); }
    .card-deadly    { background: linear-gradient(145deg, #1e1b4b, #312e81); }
    .card-run3      { background: linear-gradient(145deg, #1e40af, #5b21b6); }
    .card-driftboss { background: linear-gradient(145deg, #4c1d95, #6d28d9); }

    .zoom-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
    }

    .zoom-overlay.active { pointer-events: all; }

    .zoom-card {
      width: 210px;
      height: 175px;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: white;
      font-family: Arial, sans-serif;
      transform: scale(1);
      transition: transform 0.6s cubic-bezier(0.16,1,0.3,1), border-radius 0.6s ease;
    }

    .zoom-card.zooming {
      transform: scale(30);
      border-radius: 0px;
    }

    .zoom-card .emoji { font-size: 2.8rem; line-height: 1; }
    .zoom-card .label { font-size: 0.9rem; letter-spacing: 1.5px; text-transform: uppercase; font-weight: bold; }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @media (max-width: 600px) {
      header h1 { font-size: 1.8rem; }
      .card { width: 150px; height: 140px; }
      .card .emoji { font-size: 2.2rem; }
      .card .label { font-size: 0.75rem; }
      .search-wrap input { width: 260px; }
    }
  </style>
</head>
<body>

  <div class="bg-glow"></div>

  <header>
    <h1>Game Portal by banana</h1>
    <p>Select a game to play</p>
  </header>
  <div class="divider"></div>

  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search games..." />
  </div>

  <div class="grid" id="grid">

    <a class="card card-drivemad" href="drivemad.html" data-emoji="🚗" data-label="Drive Mad" data-bg="linear-gradient(145deg, #5b21b6, #4338ca)" data-name="drive mad">
      <span class="emoji">🚗</span>
      <span class="label">Drive Mad</span>
    </a>

    <a class="card card-polytrack" href="polytrack.html" data-emoji="🏎️" data-label="PolyTrack" data-bg="linear-gradient(145deg, #1d4ed8, #0369a1)" data-name="polytrack">
      <span class="emoji">🏎️</span>
      <span class="label">PolyTrack</span>
    </a>

    <a class="card card-slope" href="slope.html" data-emoji="🟢" data-label="Slope" data-bg="linear-gradient(145deg, #6d28d9, #5b21b6)" data-name="slope">
      <span class="emoji">🟢</span>
      <span class="label">Slope</span>
    </a>

    <a class="card card-flappy" href="flappybird.html" data-emoji="🐦" data-label="Flappy Bird" data-bg="linear-gradient(145deg, #3730a3, #4f46e5)" data-name="flappy bird">
      <span class="emoji">🐦</span>
      <span class="label">Flappy Bird</span>
    </a>

    <a class="card card-deadly" href="deadlydescent.html" data-emoji="💀" data-label="Deadly Descent" data-bg="linear-gradient(145deg, #1e1b4b, #312e81)" data-name="deadly descent">
      <span class="emoji">💀</span>
      <span class="label">Deadly Descent</span>
    </a>

    <a class="card card-run3" href="run3.html" data-emoji="🏃" data-label="Run 3" data-bg="linear-gradient(145deg, #1e40af, #5b21b6)" data-name="run 3">
      <span class="emoji">🏃</span>
      <span class="label">Run 3</span>
    </a>

    <a class="card card-driftboss" href="driftboss.html" data-emoji="🚙" data-label="Drift Boss" data-bg="linear-gradient(145deg, #4c1d95, #6d28d9)" data-name="drift boss">
      <span class="emoji">🚙</span>
      <span class="label">Drift Boss</span>
    </a>

  </div>

  <div class="no-results" id="noResults">No games found</div>

  <div class="zoom-overlay" id="zoomOverlay">
    <div class="zoom-card" id="zoomCard">
      <span class="emoji" id="zoomEmoji"></span>
      <span class="label" id="zoomLabel"></span>
    </div>
  </div>

  <script>
    const overlay = document.getElementById('zoomOverlay');
    const zoomCard = document.getElementById('zoomCard');
    const zoomEmoji = document.getElementById('zoomEmoji');
    const zoomLabel = document.getElementById('zoomLabel');
    const searchInput = document.getElementById('searchInput');
    const noResults = document.getElementById('noResults');

    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', function(e) {
        e.preventDefault();
        const dest = this.getAttribute('href');
        const emoji = this.getAttribute('data-emoji');
        const label = this.getAttribute('data-label');
        const bg = this.getAttribute('data-bg');

        zoomEmoji.textContent = emoji;
        zoomLabel.textContent = label;
        zoomCard.style.background = bg;

        overlay.style.opacity = '1';
        overlay.classList.add('active');

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            zoomCard.classList.add('zooming');
          });
        });

        setTimeout(() => {
          window.location.href = dest;
        }, 580);
      });
    });

    searchInput.addEventListener('input', function() {
      const query = this.value.toLowerCase().trim();
      const cards = document.querySelectorAll('.card');
      let visibleCount = 0;

      cards.forEach(card => {
        const name = card.getAttribute('data-name');
        if (name.includes(query)) {
          card.classList.remove('hidden');
          visibleCount++;
        } else {
          card.classList.add('hidden');
        }
      });

      noResults.style.display = visibleCount === 0 ? 'block' : 'none';
    });
  </script>

</body>
</html>
